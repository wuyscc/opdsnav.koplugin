name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate short changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          {
            echo "## What's changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since \`$PREV_TAG\`:"
              git log --pretty='- %s (%h)' "${PREV_TAG}..${CURRENT_TAG}" | head -n 20
            else
              echo "Initial release changes:"
              git log --pretty='- %s (%h)' "${CURRENT_TAG}" | head -n 20
            fi
          } > RELEASE_NOTES.md

      - name: Package Plugin
        run: |
          # Define the plugin name
          PLUGIN_NAME="opdsnav.koplugin"
          
          # Create a temporary staging directory
          mkdir -p staging/$PLUGIN_NAME
          
          # Copy everything to staging except things we don't want in the release
          rsync -av --progress . staging/$PLUGIN_NAME --exclude 'README.md' --exclude 'LICENSE' --exclude 'CHANGELOG.md' --exclude '.gitignore' --exclude 'RELEASE_NOTES.md' --exclude '.git*' --exclude '.github' --exclude 'staging' --exclude '*.zip'
          
          # Go to staging and zip the folder
          cd staging
          zip -r ../${PLUGIN_NAME}.zip .
          
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: opdsnav.koplugin.zip
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
